<polygon points="1840,790 1828,768 1852,768" fill="#2e8b7f"/>
<line x1="1730" y1="888" x2="1840" y2="840" stroke="#b36b00" stroke-width="6" stroke-linecap="round"/>
<polygon points="1840,840 1828,862 1852,862" fill="#b36b00"/>
<text x="1100" y="1060" fill="#17212b" font-family="Arial, Helvetica, sans-serif" font-size="29" font-weight="700" text-anchor="middle">
<tspan x="1100" dy="0">Approved boundary: KORA-controlled execution avoided 80 of 100 simulated model invocations versus a naive direct baseline.</tspan>
</text>
<text x="1100" y="1105" fill="#52616d" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="400" text-anchor="middle">
<tspan x="1100" dy="0">Visual non-claim: no real API calls, production traffic, cost savings, latency improvement, energy reduction, broad superiority, or external validation is implied.</tspan>
</text>
</svg>