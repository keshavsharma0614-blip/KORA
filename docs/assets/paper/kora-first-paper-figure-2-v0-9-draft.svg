<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1200" viewBox="0 0 2200 1200" role="img" aria-labelledby="title desc">
<title id="title">Figure 2. Direct baseline vs KORA-controlled benchmark flow</title>
<desc id="desc">Draft paper figure comparing direct baseline simulated model invocations with KORA-controlled deterministic-heavy benchmark routing.</desc>
<rect width="2200" height="1200" fill="#f7fafc"/>
<text x="70" y="78" fill="#17212b" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="700" text-anchor="start">
<tspan x="70" dy="0">Figure 2. Direct baseline vs KORA-controlled benchmark flow</tspan>
</text>
<text x="70" y="126" fill="#52616d" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="400" text-anchor="start">
<tspan x="70" dy="0">Reproducible 100-task deterministic-heavy benchmark; simulated model-invocation counters only.</tspan>
</text>
<rect x="90" y="220" width="2020" height="300" rx="12" fill="#ffffff" stroke="#c9d5df" stroke-width="3"/>
<rect x="90" y="620" width="2020" height="360" rx="12" fill="#ffffff" stroke="#c9d5df" stroke-width="3"/>
<text x="145" y="285" fill="#15324a" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" text-anchor="start">
<tspan x="145" dy="0">Direct baseline</tspan>
</text>
<text x="145" y="685" fill="#15324a" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" text-anchor="start">
<tspan x="145" dy="0">KORA-controlled execution</tspan>
</text>
<rect x="170" y="335" width="310" height="135" rx="10" fill="#ffffff" stroke="#2d6f9f" stroke-width="4"/>
<text x="325.0" y="383.5" fill="#17212b" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="700" text-anchor="middle">
<tspan x="325.0" dy="0">100 benchmark</tspan>
<tspan x="325.0" dy="37.8">tasks</tspan>
</text>
<rect x="760" y="335" width="300" height="135" rx="10" fill="#ffffff" stroke="#2d6f9f" stroke-width="4"/>
<text x="910.0" y="364.5" fill="#17212b" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="700" text-anchor="middle">
<tspan x="910.0" dy="0">Direct</tspan>
<tspan x="910.0" dy="37.8">baseline</tspan>
</text>
<text x="910.0" y="448.5" fill="#52616d" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="400" text-anchor="middle">
<tspan x="910.0" dy="0">model-first path</tspan>
</text>
<rect x="1330" y="325" width="430" height="145" rx="10" fill="#ffffff" stroke="#b36b00" stroke-width="4"/>
<text x="1545.0" y="359.5" fill="#17212b" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="700" text-anchor="middle">
<tspan x="1545.0" dy="0">100 simulated</tspan>
<tspan x="1545.0" dy="37.8">model invocations</tspan>
</text>
<text x="1545.0" y="443.5" fill="#52616d" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="400" text-anchor="middle">
<tspan x="1545.0" dy="0">one counted invocation per task</tspan>
</text>
<rect x="170" y="750" width="310" height="115" rx="10" fill="#ffffff" stroke="#2d6f9f" stroke-width="4"/>
<text x="325.0" y="788.5" fill="#17212b" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="700" text-anchor="middle">
<tspan x="325.0" dy="0">100 benchmark</tspan>
<tspan x="325.0" dy="37.8">tasks</tspan>
</text>
<rect x="720" y="730" width="360" height="150" rx="10" fill="#ffffff" stroke="#15324a" stroke-width="4"/>
<text x="900.0" y="767.0" fill="#17212b" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="700" text-anchor="middle">
<tspan x="900.0" dy="0">KORA</tspan>
<tspan x="900.0" dy="37.8">execution control</tspan>
</text>
<text x="900.0" y="851.0" fill="#52616d" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="400" text-anchor="middle">
<tspan x="900.0" dy="0">route before inference</tspan>
</text>
<rect x="1300" y="655" width="430" height="135" rx="10" fill="#ffffff" stroke="#2e8b7f" stroke-width="4"/>
<text x="1515.0" y="684.5" fill="#17212b" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="700" text-anchor="middle">
