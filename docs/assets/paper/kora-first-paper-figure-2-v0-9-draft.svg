<tspan x="1515.0" dy="0">20 model-candidate</tspan>
<tspan x="1515.0" dy="37.8">paths</tspan>
</text>
<text x="1515.0" y="933.5" fill="#52616d" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="400" text-anchor="middle">
<tspan x="1515.0" dy="0">simulated invocation counters</tspan>
</text>
<rect x="1840" y="735" width="250" height="170" rx="10" fill="#ffffff" stroke="#2e8b7f" stroke-width="4"/>
<text x="1965.0" y="763.0" fill="#17212b" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="700" text-anchor="middle">
<tspan x="1965.0" dy="0">80 avoided</tspan>
<tspan x="1965.0" dy="37.8">simulated</tspan>
<tspan x="1965.0" dy="37.8">invocations</tspan>
</text>
<text x="1965.0" y="889.0" fill="#52616d" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="400" text-anchor="middle">
<tspan x="1965.0" dy="0">80% in this workload</tspan>
</text>
