<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1200" viewBox="0 0 2200 1200" role="img" aria-labelledby="title desc">
<title id="title">Figure 1. KORA execution-control architecture</title>
<desc id="desc">Draft paper figure showing request intake, KORA execution control, task graph, deterministic route, validation, output, model-candidate escalation, and telemetry.</desc>
<rect width="2200" height="1200" fill="#f7fafc"/>
<text x="70" y="78" fill="#17212b" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="700" text-anchor="start">
<tspan x="70" dy="0">Figure 1. KORA execution-control architecture</tspan>
</text>
<text x="70" y="126" fill="#52616d" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="400" text-anchor="start">
<tspan x="70" dy="0">Architecture only: deterministic-first execution control before model inference; not a production-readiness claim.</tspan>
</text>
